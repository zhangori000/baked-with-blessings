services:
  postgres:
    image: postgres:16-alpine
    container_name: baked-with-blessings-postgres
    environment:
      POSTGRES_DB: baked_with_blessings
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:

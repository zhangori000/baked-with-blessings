<?xml version="1.0" encoding="UTF-8"?>
<!-- ============================================================
     BRIGHT FANTASY CASTLE VALLEY — MOBILE VERSION
     Viewport: 430 x 475 (larger than iPhone 14 Pro's 393px width)
     Style: Bright fantasy medieval, saturated greens, storybook
     ============================================================ -->
<svg xmlns="http://www.w3.org/2000/svg"
     width="100%"
     viewBox="0 0 430 475"
     role="img"
     aria-label="Bright fantasy castle valley scene">
  <title>Bright fantasy castle valley</title>
  <desc>A hilltop castle surrounded by a red-roofed village sits in a sunlit valley of bright green rolling hills, distant blue mountains, and a golden wheat field in the foreground.</desc>

  <!-- ============ GRADIENT DEFINITIONS ============ -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a8fd4"/>
      <stop offset="100%" stop-color="#b8dff0"/>
    </linearGradient>
    <linearGradient id="farHills" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b9dc4"/>
      <stop offset="100%" stop-color="#8ab5d0"/>
    </linearGradient>
    <linearGradient id="midGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4fa83a"/>
      <stop offset="100%" stop-color="#6bc248"/>
    </linearGradient>
    <linearGradient id="brightGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7dd148"/>
      <stop offset="100%" stop-color="#a4e055"/>
    </linearGradient>
    <linearGradient id="foreGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5fb838"/>
      <stop offset="100%" stop-color="#3d8a28"/>
    </linearGradient>
    <linearGradient id="wheat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0d050"/>
      <stop offset="100%" stop-color="#d4a830"/>
    </linearGradient>
  </defs>

  <!-- ============ SKY (top ~38% of canvas) ============ -->
  <rect x="0" y="0" width="430" height="200" fill="url(#sky)"/>

  <!-- ============ CLOUDS ============
       Soft, puffy cumulus clouds built from overlapping ellipses.
       This mobile composition keeps three clusters so the castle and
       hills remain the focus while still feeling lively and airy.
       ============================================================ -->
  <ellipse cx="70" cy="60" rx="42" ry="13" fill="#ffffff" opacity="0.95"/>
  <ellipse cx="95" cy="50" rx="33" ry="15" fill="#ffffff" opacity="0.95"/>
  <ellipse cx="80" cy="65" rx="35" ry="11" fill="#f0f4f8" opacity="0.85"/>

  <ellipse cx="250" cy="45" rx="55" ry="16" fill="#ffffff" opacity="0.95"/>
  <ellipse cx="290" cy="33" rx="44" ry="17" fill="#ffffff" opacity="0.95"/>
  <ellipse cx="268" cy="55" rx="50" ry="13" fill="#e8eef4" opacity="0.85"/>
  <ellipse cx="335" cy="50" rx="33" ry="13" fill="#ffffff" opacity="0.9"/>

  <ellipse cx="385" cy="77" rx="38" ry="11" fill="#ffffff" opacity="0.9"/>
  <ellipse cx="402" cy="72" rx="27" ry="13" fill="#ffffff" opacity="0.85"/>

  <!-- ============ DISTANT MOUNTAINS ============ -->
  <path d="M0,180 Q90,163 180,173 Q270,185 360,168 Q405,160 430,166 L430,225 L0,225 Z"
        fill="url(#farHills)" opacity="0.85"/>
  <path d="M0,198 Q100,186 200,194 Q305,204 430,190 L430,235 L0,235 Z"
        fill="#7ca8c9" opacity="0.7"/>

  <!-- ============ MID-DISTANCE GREEN HILLS ============ -->
  <path d="M0,220 Q70,203 150,214 Q225,225 305,212 Q375,204 430,214 L430,260 L0,260 Z"
        fill="url(#midGreen)"/>

  <!-- ============ CASTLE HILL ============ -->
  <ellipse cx="215" cy="248" rx="125" ry="32" fill="#4fa83a"/>
  <ellipse cx="215" cy="241" rx="113" ry="27" fill="#5fb840"/>

  <!-- ============ CASTLE ============ -->
  <rect x="175" y="190" width="80" height="58" fill="#b8b8b8"/>
  <rect x="178" y="185" width="74" height="7" fill="#8a8a8a"/>
  <rect x="167" y="175" width="20" height="73" fill="#c4c4c4"/>
  <rect x="164" y="171" width="26" height="7" fill="#8a8a8a"/>
  <polygon points="164,171 177,156 190,171" fill="#9a2a22"/>
  <rect x="240" y="178" width="22" height="70" fill="#c4c4c4"/>
  <rect x="237" y="174" width="28" height="7" fill="#8a8a8a"/>
  <polygon points="237,174 251,158 265,174" fill="#9a2a22"/>
  <rect x="202" y="160" width="24" height="88" fill="#c8c8c8"/>
  <rect x="198" y="156" width="32" height="7" fill="#888888"/>
  <polygon points="198,156 214,122 230,156" fill="#8a1f18"/>
  <rect x="213" y="92" width="2" height="32" fill="#555555"/>
  <polygon points="215,94 233,100 215,106" fill="#d43828"/>
  <rect x="186" y="202" width="5" height="13" fill="#1a2530"/>
  <rect x="202" y="207" width="6" height="15" fill="#1a2530"/>
  <rect x="218" y="202" width="5" height="13" fill="#1a2530"/>
  <rect x="240" y="207" width="6" height="15" fill="#1a2530"/>

  <!-- ============ VILLAGE HOUSES ============
       Tiny cream houses with saturated red roofs. These same shapes
       are echoed in the spawnable house SVGs so interactive houses
       feel like they belong to the painted village.
       ============================================================ -->
  <g>
    <rect x="95" y="238" width="24" height="20" fill="#e8d8a8"/>
    <polygon points="93,238 107,225 121,238" fill="#c43525"/>
  </g>
  <g>
    <rect x="128" y="243" width="22" height="18" fill="#e8d8a8"/>
    <polygon points="126,243 139,231 152,243" fill="#b83020"/>
  </g>
  <g>
    <rect x="283" y="243" width="24" height="20" fill="#e8d8a8"/>
    <polygon points="281,243 295,230 309,243" fill="#c43525"/>
  </g>
  <g>
    <rect x="316" y="248" width="22" height="18" fill="#e8d8a8"/>
    <polygon points="314,248 327,236 340,248" fill="#b83020"/>
  </g>
  <g>
    <rect x="62" y="287" width="26" height="22" fill="#e8d8a8"/>
    <polygon points="60,287 75,273 90,287" fill="#c43525"/>
  </g>
  <g>
    <rect x="99" y="294" width="22" height="19" fill="#e8d8a8"/>
    <polygon points="97,294 110,281 123,294" fill="#b83020"/>
  </g>
  <g>
    <rect x="334" y="292" width="26" height="22" fill="#e8d8a8"/>
    <polygon points="332,292 347,278 362,292" fill="#c43525"/>
  </g>
  <g>
    <rect x="367" y="297" width="22" height="19" fill="#e8d8a8"/>
    <polygon points="365,297 378,284 391,297" fill="#b83020"/>
  </g>

  <!-- ============ BRIGHT GREEN ROLLING HILLS ============ -->
  <path d="M0,277 Q107,260 215,277 Q322,294 430,272 L430,350 L0,350 Z"
        fill="url(#brightGreen)"/>
  <path d="M0,310 Q113,293 225,313 Q338,327 430,304 L430,372 L0,372 Z"
        fill="#8dd648"/>
  <ellipse cx="80" cy="327" rx="12" ry="6" fill="#3d8a28" opacity="0.5"/>
  <ellipse cx="315" cy="333" rx="14" ry="6" fill="#3d8a28" opacity="0.5"/>
  <ellipse cx="180" cy="345" rx="10" ry="5" fill="#3d8a28" opacity="0.5"/>

  <!-- ============ FRAMING TREES ============ -->
  <g>
    <ellipse cx="15" cy="220" rx="34" ry="47" fill="#1f3a1a"/>
    <ellipse cx="30" cy="203" rx="25" ry="36" fill="#2d5225"/>
  </g>
  <g>
    <ellipse cx="415" cy="215" rx="36" ry="50" fill="#1f3a1a"/>
    <ellipse cx="398" cy="198" rx="27" ry="38" fill="#2d5225"/>
  </g>
  <g>
    <ellipse cx="34" cy="304" rx="16" ry="20" fill="#1f3a1a"/>
    <ellipse cx="29" cy="295" rx="12" ry="15" fill="#3d7028"/>
  </g>
  <g>
    <ellipse cx="396" cy="320" rx="15" ry="19" fill="#1f3a1a"/>
    <ellipse cx="392" cy="312" rx="11" ry="14" fill="#3d7028"/>
  </g>

  <!-- ============ FOREGROUND DARK GREEN GRASS ============ -->
  <path d="M0,350 Q113,333 225,356 Q338,372 430,350 L430,420 L0,420 Z"
        fill="url(#foreGreen)"/>

  <!-- ============ GOLDEN WHEAT FIELD ============ -->
  <path d="M0,400 Q107,384 215,406 Q322,423 430,398 L430,475 L0,475 Z"
        fill="url(#wheat)"/>
  <path d="M0,417 Q90,406 180,422 Q270,433 362,420 Q405,414 430,420 L430,475 L0,475 Z"
        fill="#e8c240"/>
  <g stroke="#a88420" stroke-width="0.8" opacity="0.6">
    <line x1="20" y1="423" x2="20" y2="440"/>
    <line x1="45" y1="425" x2="45" y2="442"/>
    <line x1="70" y1="423" x2="70" y2="440"/>
    <line x1="95" y1="427" x2="95" y2="444"/>
    <line x1="120" y1="423" x2="120" y2="440"/>
    <line x1="145" y1="425" x2="145" y2="442"/>
    <line x1="170" y1="423" x2="170" y2="440"/>
    <line x1="195" y1="427" x2="195" y2="444"/>
    <line x1="220" y1="423" x2="220" y2="440"/>
    <line x1="245" y1="425" x2="245" y2="442"/>
    <line x1="270" y1="423" x2="270" y2="440"/>
    <line x1="295" y1="427" x2="295" y2="444"/>
    <line x1="320" y1="425" x2="320" y2="442"/>
    <line x1="345" y1="423" x2="345" y2="440"/>
    <line x1="370" y1="427" x2="370" y2="444"/>
    <line x1="395" y1="423" x2="395" y2="440"/>
  </g>
  <path d="M0,458 Q215,473 430,463 L430,475 L0,475 Z"
        fill="#2d5225" opacity="0.5"/>
</svg>

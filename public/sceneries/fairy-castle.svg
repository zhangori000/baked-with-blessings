  <path d="M0,440 Q315,420 630,445 Q945,465 1200,442 L1200,530 L0,530 Z"
        fill="url(#foreGreen)"/>

  <!-- ============ GOLDEN WHEAT FIELD ============ -->
  <path d="M0,505 Q300,485 600,510 Q900,528 1200,500 L1200,600 L0,600 Z"
        fill="url(#wheat)"/>
  <path d="M0,525 Q250,510 500,528 Q750,545 1000,528 Q1130,518 1200,525 L1200,600 L0,600 Z"
        fill="#e8c240"/>
  <g stroke="#a88420" stroke-width="1" opacity="0.6">
    <line x1="30" y1="532" x2="30" y2="552"/>
    <line x1="70" y1="534" x2="70" y2="554"/>
    <line x1="110" y1="532" x2="110" y2="552"/>

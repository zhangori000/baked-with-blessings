<?xml version="1.0" encoding="UTF-8"?>
<!-- ============================================================
     BRIGHT FANTASY CASTLE VALLEY — DESKTOP VERSION
     Viewport: 1200 x 600 (widescreen landscape, 2:1 aspect ratio)
     Style: Bright fantasy medieval, saturated greens, storybook
     More horizontal breathing room: extra clouds, village sprawl,
     and tree framing to fill the wider canvas.
     ============================================================ -->
<svg xmlns="http://www.w3.org/2000/svg"
     width="100%"
     viewBox="0 0 1200 600"
     role="img"
     aria-label="Bright fantasy castle valley scene">
  <title>Bright fantasy castle valley</title>
  <desc>A hilltop castle surrounded by a red-roofed village sits in a sunlit valley of bright green rolling hills, distant blue mountains, and a golden wheat field in the foreground.</desc>

  <!-- ============ GRADIENT DEFINITIONS ============ -->
  <defs>
    <!-- Sky: deeper blue at top fading to pale blue at horizon -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a8fd4"/>
      <stop offset="100%" stop-color="#b8dff0"/>
    </linearGradient>

    <!-- Distant mountains: dusty blue -->
    <linearGradient id="farHills" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b9dc4"/>
      <stop offset="100%" stop-color="#8ab5d0"/>
    </linearGradient>

    <!-- Mid-distance hills: medium vivid green -->
    <linearGradient id="midGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4fa83a"/>
      <stop offset="100%" stop-color="#6bc248"/>
    </linearGradient>

    <!-- Signature bright fantasy green (the hero color) -->
    <linearGradient id="brightGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7dd148"/>
      <stop offset="100%" stop-color="#a4e055"/>
    </linearGradient>

    <!-- Foreground green: darker, richer -->
    <linearGradient id="foreGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5fb838"/>
      <stop offset="100%" stop-color="#3d8a28"/>
    </linearGradient>

    <!-- Wheat field: warm gold -->
    <linearGradient id="wheat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0d050"/>
      <stop offset="100%" stop-color="#d4a830"/>
    </linearGradient>
  </defs>

  <!-- ============ SKY (top ~42% of canvas) ============ -->
  <rect x="0" y="0" width="1200" height="250" fill="url(#sky)"/>

  <!-- ============ CLOUDS ============
       Style: Soft, puffy, cumulus-style clouds made from overlapping
       white ellipses with slight opacity variations. Each cloud is
       a cluster of 3-4 ellipses — a main body, an upper bump, and a
       subtle shadow underbelly in pale gray-blue.
       Five cloud clusters spread across the wider canvas:
       - Far left wisp (small)
       - Upper-left cluster (medium)
       - Center cluster (LARGEST, dominant)
       - Upper-right cluster (medium)
       - Far right wisp (small, near horizon)
       ============================================================ -->

  <!-- FAR LEFT WISP: small, thin streak -->
  <ellipse cx="80" cy="90" rx="45" ry="12" fill="#ffffff" opacity="0.9"/>
  <ellipse cx="105" cy="85" rx="30" ry="14" fill="#ffffff" opacity="0.85"/>

  <!-- UPPER-LEFT CLOUD: medium rounded cumulus -->
  <ellipse cx="230" cy="70" rx="55" ry="15" fill="#ffffff" opacity="0.95"/>
  <ellipse cx="265" cy="58" rx="42" ry="18" fill="#ffffff" opacity="0.95"/>
  <ellipse cx="245" cy="80" rx="45" ry="12" fill="#f0f4f8" opacity="0.85"/>

  <!-- CENTER CLOUD: largest, dominant multi-puff -->
  <ellipse cx="600" cy="55" rx="75" ry="18" fill="#ffffff" opacity="0.95"/>
  <ellipse cx="650" cy="40" rx="60" ry="22" fill="#ffffff" opacity="0.95"/>
  <ellipse cx="620" cy="70" rx="65" ry="15" fill="#e8eef4" opacity="0.85"/>
  <ellipse cx="700" cy="62" rx="45" ry="16" fill="#ffffff" opacity="0.9"/>
  <ellipse cx="555" cy="68" rx="35" ry="14" fill="#ffffff" opacity="0.9"/>

  <!-- UPPER-RIGHT CLOUD: medium cluster -->
  <ellipse cx="900" cy="75" rx="58" ry="16" fill="#ffffff" opacity="0.95"/>
  <ellipse cx="940" cy="62" rx="44" ry="19" fill="#ffffff" opacity="0.95"/>
  <ellipse cx="915" cy="88" rx="50" ry="13" fill="#e8eef4" opacity="0.85"/>

  <!-- FAR RIGHT WISP: horizon-adjacent streak -->
  <ellipse cx="1100" cy="105" rx="50" ry="13" fill="#ffffff" opacity="0.9"/>
  <ellipse cx="1130" cy="98" rx="35" ry="15" fill="#ffffff" opacity="0.85"/>

  <!-- ============ DISTANT MOUNTAINS ============ -->
  <path d="M0,225 Q150,205 300,215 Q450,228 600,210 Q750,198 900,215 Q1050,228 1200,212 L1200,285 L0,285 Z"
        fill="url(#farHills)" opacity="0.85"/>
  <path d="M0,248 Q180,233 360,242 Q540,254 720,240 Q900,230 1200,240 L1200,295 L0,295 Z"
        fill="#7ca8c9" opacity="0.7"/>

  <!-- ============ MID-DISTANCE GREEN HILLS ============ -->
  <path d="M0,275 Q120,258 260,268 Q400,280 540,266 Q680,254 820,266 Q960,278 1200,265 L1200,325 L0,325 Z"
        fill="url(#midGreen)"/>

  <!-- ============ CASTLE HILL ============ -->
  <ellipse cx="600" cy="313" rx="175" ry="40" fill="#4fa83a"/>
  <ellipse cx="600" cy="304" rx="158" ry="33" fill="#5fb840"/>


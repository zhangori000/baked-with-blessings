  <rect x="576" y="184" width="46" height="10" fill="#888888"/>
  <polygon points="576,184 599,135 622,184" fill="#8a1f18"/>
  <rect x="598" y="90" width="3" height="46" fill="#555555"/>
  <polygon points="601,93 627,101 601,109" fill="#d43828"/>
  <rect x="560" y="253" width="7" height="18" fill="#1a2530"/>

<svg width="100%" viewBox="0 0 112 94" xmlns="http://www.w3.org/2000/svg">
  <!-- Spawnable village cottage:
       Wider cream walls and a lower roofline so spawned houses can
       vary in silhouette while staying in the same storybook palette. -->
  <rect x="20" y="38" width="72" height="38" rx="2" fill="#eadcad"/>
  <polygon points="16,40 56,14 96,40" fill="#b83020"/>
  <polygon points="24,40 56,20 88,40" fill="#db5a32" opacity="0.62"/>
  <rect x="50" y="52" width="12" height="24" fill="#714627"/>
</svg>
